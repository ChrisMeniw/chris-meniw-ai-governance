name: Auto-reparación del corpus (healthcheck)

# Corre solo, sin intervención humana:
#  - todos los días a las 06:17 UTC
#  - o manualmente desde la pestaña Actions (workflow_dispatch)
on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: healthcheck
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Healthcheck y auto-reparación
        run: python scripts/healthcheck.py

      - name: Commit de la restauración (solo si hubo cambios)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "meniw-healthcheck[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "auto-repair: restauración de archivos canónicos (healthcheck automático)"
            git push
            echo "Se restauraron archivos y se pusheó el arreglo."
          else
            echo "Todo sano: no hubo nada que reparar."
          fi
